# version: "3.8"

services:
  # 1. Traefik Reverse Proxy (API Gateway / Load Balancer)
  traefik:
    image: traefik:v2.10
    command:
      - "--api.insecure=true"
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      - "--entrypoints.web.address=:80"
    ports:
      - "80:80"
      - "8080:8080" # Traefik Dashboard
    volumes:
      - "/var/run/docker.sock:/var/run/docker.sock:ro"
    networks:
      - techaxon-net

  # 2. Next.js Frontend & API (The Auth Microservice / SSO Provider)
  nextjs:
    build:
      context: .
      dockerfile: Dockerfile.dev
    environment:
      - COUCHDB_URL=${COUCHDB_URL}
      - REDIS_URL=${REDIS_URL}
      - JWT_ACCESS_SECRET=${JWT_ACCESS_SECRET}
      - JWT_REFRESH_SECRET=${JWT_REFRESH_SECRET}
      - COOKIE_DOMAIN=${COOKIE_DOMAIN}
    volumes:
      - .:/app
      - /app/node_modules
    labels:
      - "traefik.enable=true"
      # Route any subdomain of techaxon.localhost to this Next.js app for testing SSO
      - "traefik.http.routers.nextjs.rule=HostRegexp(`{subdomain:[a-z0-9-]+}.techaxon.localhost`) || Host(`techaxon.localhost`)"
      - "traefik.http.routers.nextjs.entrypoints=web"
    networks:
      - techaxon-net
    depends_on:
      - couchdb
      - redis

  # 3. Apache CouchDB (Data Persistence)
  couchdb:
    image: couchdb:3.3
    environment:
      - COUCHDB_USER=${COUCHDB_USER}
      - COUCHDB_PASSWORD=${COUCHDB_PASSWORD}
    ports:
      - "5984:5984" # Exposing so you can access Fauxton (DB Admin UI) in Codespace
    volumes:
      - couchdb-data:/opt/couchdb/data
    networks:
      - techaxon-net

  # 4. Redis (Session & Refresh Token Rotation lookup)
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    networks:
      - techaxon-net

volumes:
  couchdb-data:
  redis-data:

networks:
  techaxon-net:
    driver: bridge
